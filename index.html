<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pañol Central — Grupo Pose</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
:root{
  --bg:#ffffff;--bg2:#f5f5f0;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --info-bg:#e6f1fb;--info-text:#0c447c;--info-border:#85b7eb;
  --ok-bg:#eaf3de;--ok-text:#27500a;--ok-border:#97c459;
  --warn-bg:#faeeda;--warn-text:#633806;--warn-border:#ef9f27;
  --danger-bg:#fcebeb;--danger-text:#791f1f;--danger-border:#f09595;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1e;--bg2:#161616;--bg3:#2a2a2a;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --info-bg:#042c53;--info-text:#b5d4f4;--info-border:#185fa5;
    --ok-bg:#173404;--ok-text:#c0dd97;--ok-border:#3b6d11;
    --warn-bg:#412402;--warn-text:#fac775;--warn-border:#854f0b;
    --danger-bg:#501313;--danger-text:#f7c1c1;--danger-border:#a32d2d;
  }
  body{background:var(--bg2)}
}
.app{display:flex;flex-direction:column;min-height:100vh}
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.topbar-title{font-size:11px;font-weight:700;font-family:Verdana,Geneva,sans-serif;letter-spacing:2px;color:#2d2d2d;display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;border-radius:50%;background:var(--info-bg);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--info-text)}
.topbar-user{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.sync-indicator{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.sync-dot.ok{background:#3b6d11}.sync-dot.saving{background:#ba7517}.sync-dot.error{background:#a32d2d}
.main-layout{display:flex;flex:1;min-height:0}
.sidebar{width:195px;border-right:1px solid var(--border);background:var(--bg);padding:8px;flex-shrink:0;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto}
.nav-sep{font-size:10px;color:var(--text2);padding:12px 10px 3px;text-transform:uppercase;letter-spacing:0.05em;font-weight:700}
.nav-item{padding:8px 11px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:background 0.15s}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:var(--bg3);color:var(--text);font-weight:500}
.content{flex:1;padding:20px;overflow-y:auto;min-width:0;background:var(--bg2)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:500;margin-bottom:12px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg3);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600}
.metric-value.ok{color:var(--ok-text)}.metric-value.warn{color:var(--warn-text)}
.section-title{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.search-input{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;width:220px;outline:none}
.search-input:focus{border-color:var(--info-border)}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:transparent;border:none;cursor:pointer;padding:4px;margin-right:8px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all 0.25s}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg3)}.btn:disabled{opacity:0.4;cursor:default}
.btn-primary{background:var(--info-bg);border-color:var(--info-border);color:var(--info-text);font-weight:500}
.btn-primary:hover{opacity:0.85}
.btn-info{background:var(--info-bg);border-color:var(--info-border);color:var(--info-text);font-size:12px;padding:4px 10px}
.btn-success{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok-text)}
.btn-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text);font-size:12px;padding:4px 10px}
.btn-danger{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-text);font-size:12px;padding:4px 10px}
.btn-sm{font-size:12px;padding:4px 10px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-weight:500;font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-info{background:var(--info-bg);color:var(--info-text)}
.badge-ok{background:var(--ok-bg);color:var(--ok-text)}
.badge-warn{background:var(--warn-bg);color:var(--warn-text)}
.badge-danger{background:var(--danger-bg);color:var(--danger-text)}
.badge-gray{background:var(--bg3);color:var(--text2)}
.stock-low{color:var(--danger-text);font-weight:600}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.single{grid-template-columns:1fr}.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--text2);font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;outline:none;transition:border 0.15s}
.form-group input:focus,.form-group select:focus{border-color:var(--info-border)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:780px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.remito-box{border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:10px;font-size:13px}
.remito-header{display:flex;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.login-wrap{display:flex;align-items:center;justify-content:center;flex:1;background:var(--bg2)}
.login-card{width:360px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px}
.login-logo{text-align:center;margin-bottom:22px}
.logo-circle{width:52px;height:52px;border-radius:50%;background:var(--info-bg);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--info-text)}
.alert{padding:9px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:10px;display:none}
.alert.show{display:block}
.alert-danger{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border)}
.pager{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--text2)}
.autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);z-index:100;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.autocomplete-item:hover{background:var(--bg3)}
.autocomplete-item:last-child{border-bottom:none}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:var(--bg2)}
.progress-bar{width:220px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#185fa5;transition:width 0.35s;width:0%}
@media(max-width:768px){
  .sidebar{display:none;position:fixed;top:0;left:0;width:75%;max-width:280px;height:100vh;z-index:300;box-shadow:4px 0 20px rgba(0,0,0,0.15);padding-top:60px;overflow-y:auto}
  .sidebar.open{display:flex;flex-direction:column}
  .content{padding:12px}
  .hamburger{display:flex}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:299}
  .sidebar-overlay.open{display:block}
  .topbar-title{font-size:13px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  table{font-size:11px}
  th,td{padding:5px 6px}
}
@media(min-width:769px){
  .hamburger{display:none}
  .sidebar{display:flex!important;flex-direction:column;position:sticky}
}
</style>
</head>

async function supaFetch(path, method='GET', body=null){
  const opts = {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'resolution=merge-duplicates':'',
      'Accept': 'application/json',
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if(!r.ok){
    const err = await r.text();
    throw new Error('Supabase error ' + r.status + ': ' + err);
  }
  if(r.status===204) return null;
  return r.json();
}

// Cargar toda la DB desde Supabase
async function loadFromSupabase(){

    supaFetch('solicitudes?select=*&order=fecha.desc'),
    supaFetch('remitos?select=*&order=fecha.desc'),
    supaFetch('ingresos?select=*&order=fecha.desc'),
  ]);

  };
}

// Guardar cambios en Supabase (upsert por tabla y entidad)
async function saveDB(){
  setSyncState('saving','guardando...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await flushPendingSaves();
      setSyncState('ok','sincronizado');
    }catch(e){
      console.error('Error guardando:', e);
      setSyncState('error','error al guardar');
    }
  }, 800);
}

// Cola de cambios pendientes
const pendingSaves = {};

function markDirty(table, record){
  if(!pendingSaves[table]) pendingSaves[table] = {};
  pendingSaves[table][record.id] = record;
}

async function flushPendingSaves(){
  for(const [table, records] of Object.entries(pendingSaves)){
    const items = Object.values(records);
    if(!items.length) continue;
    const mapped = items.map(r => toSnakeCase(table, r));
    try{
      // Usar upsert: POST con on_conflict
      const r = await fetch(SUPA_URL + '/rest/v1/' + table, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates',
        },
        body: JSON.stringify(mapped)
      });
      if(!r.ok){
        const err = await r.text();
        throw new Error('Error en ' + table + ': ' + err);
      }
      delete pendingSaves[table];
    }catch(e){
      console.error('flushPendingSaves error:', e);
      throw e;
    }
  }
}

function toSnakeCase(table, obj){
  if(table==='usuarios') return {id:obj.id,nombre:obj.nombre,email:obj.email,pass:obj.pass,rol:obj.rol,obra_id:obj.obraId||null};
  if(table==='obras') return {id:obj.id,numero:obj.numero||'',nombre:obj.nombre,direccion:obj.direccion||'',responsable:obj.responsable||'',estado:obj.estado||'Activa'};
  if(table==='articulos') return {id:obj.id,codigo:obj.codigo||'',nombre:obj.nombre,categoria:obj.categoria||'',unidad:obj.unidad||'UNIDAD',stock:obj.stock||0,stock_min:obj.stockMin||0,precio:obj.precio||0,ubicacion:obj.ubicacion||'Pañol'};
  if(table==='personal') return {id:obj.id,nombre:obj.nombre,dni:obj.dni||'',cargo:obj.cargo||'',telefono:obj.telefono||'',obra_id:obj.obraId||''};
  if(table==='solicitudes') return {id:obj.id,numero:obj.numero||'',obra_id:obj.obraId||'',obra_nombre:obj.obraNombre||'',solicitante:obj.solicitante||'',fecha:obj.fecha||'',estado:obj.estado||'pendiente',items:obj.items||[]};
  if(table==='remitos') return {id:obj.id,numero:obj.numero||'',solicitud_id:obj.solicitudId||'',obra_id:obj.obraId||'',obra_nombre:obj.obraNombre||'',solicitante:obj.solicitante||'',fecha:obj.fecha||'',items:obj.items||[],estado:obj.estado||'emitido'};
  if(table==='ingresos') return {id:obj.id,proveedor:obj.proveedor||'',nro_comprobante:obj.nroComprobante||'',fecha:obj.fecha||'',items:obj.items||[]};
  return obj;
}

async function deleteFromSupabase(table, id){
  const r = await fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'DELETE',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
    }
  });
  if(!r.ok){ const err = await r.text(); throw new Error('Error eliminando: ' + err); }
}

function setActiveNav(s){

function showSection(section){
  currentSection=section;
  setActiveNav(section);
  closeSidebar();
  const c=document.getElementById('main-content');
  const renders={
    dashboard:renderDashboard,
    articulos:()=>renderListSection('articulos'),
    personal:()=>renderListSection('personal'),
    obras:()=>renderListSection('obras'),

    solicitudes:renderSolicitudes,
    remitos:renderRemitos,
    ingresos:renderIngresos,
    informes:renderInformes,
    'mis-solicitudes':renderMisSolicitudes,
    'nueva-solicitud':renderNuevaSolicitud
  };
  if(renders[section]) c.innerHTML=renders[section]();
}

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;cursor:pointer" onclick="showSection('obras')">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:8px">Obras activas</div>
      <div style="font-size:32px;font-weight:700;color:var(--ok-text);line-height:1">${totalObras}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px">de ${db.obras.length} obras totales</div>
    </div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:8px">Stock valorizado</div>
      <div style="font-size:26px;font-weight:700;color:var(--info-text);line-height:1">U$D ${stockValorizado.toLocaleString('es-AR',{maximumFractionDigits:0})}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px">${db.articulos.length.toLocaleString('es-AR')} artículos en stock</div>
    </div>
    <div style="background:var(--bg);border:${solicPendientes.length>0?'2px solid var(--danger-border)':'1px solid var(--border)'};border-radius:var(--radius-lg);padding:18px 20px;cursor:pointer" onclick="showSection('solicitudes')">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:8px">Solicitudes pendientes</div>
      <div style="font-size:32px;font-weight:700;color:${solicPendientes.length>0?'var(--danger-text)':'var(--ok-text)'};line-height:1">${solicPendientes.length}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px">${db.solicitudes.filter(s=>s.estado==='parcial').length} parciales · ${db.solicitudes.filter(s=>s.estado==='pendiente').length} nuevas</div>
    </div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;cursor:pointer" onclick="showSection('remitos')">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:8px">Remitos emitidos</div>
      <div style="font-size:32px;font-weight:700;color:var(--ok-text);line-height:1">${totalRemitos}</div>

    </div>

  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Solicitudes pendientes de atención</span>

    </div>

      ?'<p style="font-size:13px;color:var(--text2);padding:8px 0">No hay solicitudes pendientes.</p>'

function refreshTable(col){
  // Calcular resultados filtrados
  const q = filterState[col]||'';
  let items = db[col];
  if(q){ const ql=q.toLowerCase(); items=items.filter(it=>JSON.stringify(it).toLowerCase().includes(ql)); }
  const total = items.length;
  const page = pageState[col]||0;
  const pageItems = items.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const totalPages = Math.ceil(total/PAGE_SIZE)||1;

  const cfgs={
    articulos:{cols:['Código','Nombre','Categoría','Unidad','Stock','Mín','Precio','Ubicación',''],widths:['9%','24%','12%','7%','6%','5%','8%','16%','7%'],editFn:(id)=>`openModalArticulo('${id}')`},
    personal:{cols:['Legajo','Nombre','Empresa/Cargo','Teléfono','Obra',''],widths:['8%','25%','18%','14%','22%','8%'],editFn:(id)=>`openModalPersonal('${id}')`},
    obras:{cols:['N°','Nombre','Empresa','Gerencia','Estado',''],widths:['6%','32%','24%','18%','10%','10%'],editFn:(id)=>`openModalObra('${id}')`},
    usuarios:{cols:['Nombre','Usuario','Rol','Obra asignada',''],widths:['30%','20%','15%','25%','10%']}
  };
  const cfg = cfgs[col];
  if(!cfg) return;

  const colgroup = cfg.widths.map(w=>`<col style="width:${w}">`).join('');

  const rows = pageItems.map(it=>{
    let cells='';
    if(col==='articulos'){
      cells+=`<td title="${esc(it.codigo)}">${esc(it.codigo||'—')}</td>`;
      cells+=`<td title="${esc(it.nombre)}">${esc(it.nombre)}</td>`;
      cells+=`<td><span class="badge badge-gray">${esc(it.categoria||'—')}</span></td>`;
      cells+=`<td>${esc(it.unidad||'')}</td>`;
      cells+=`<td class="${it.stock<=it.stockMin&&it.stockMin>0?'stock-low':''}">${it.stock||0}</td>`;
      cells+=`<td style="color:var(--text2)">${it.stockMin||0}</td>`;
      cells+=`<td>$${(it.precio||0).toLocaleString('es-AR')}</td>`;
      const ub=it.ubicacion||'Pañol';
      cells+=`<td><span class="badge ${ub==='Pañol'?'badge-gray':'badge-info'}" style="font-size:11px;white-space:nowrap" title="${esc(ub)}">${esc(ub.length>20?ub.slice(0,18)+'...':ub)}</span></td>`;
    } else if(col==='personal'){
      const obra=db.obras.find(o=>o.id===it.obraId);
      cells+=`<td>${esc(it.dni||'—')}</td><td title="${esc(it.nombre)}">${esc(it.nombre)}</td><td>${esc(it.cargo||'—')}</td><td>${esc(it.telefono||'—')}</td><td title="${obra?obra.nombre:''}">${obra?esc(obra.nombre):'—'}</td>`;
    } else if(col==='obras'){
      cells+=`<td>${esc(it.numero||'—')}</td><td title="${esc(it.nombre)}">${esc(it.nombre)}</td><td title="${esc(it.direccion||'')}">${esc(it.direccion||'—')}</td><td>${esc(it.responsable||'—')}</td><td><span class="badge ${it.estado==='Activa'?'badge-ok':'badge-gray'}">${it.estado||'—'}</span></td>`;
    }
    const editFn = cfg.editFn ? cfg.editFn(it.id) : null;
    if(editFn) cells+=`<td style="white-space:nowrap"><button class="btn btn-sm" onclick="${editFn}">Editar</button> <button class="btn btn-danger" onclick="deleteItem('${col}','${it.id}')">✕</button></td>`;
    return `<tr>${cells}</tr>`;
  }).join('');

  const pager = totalPages>1 ? `<div class="pager">
    <button class="btn btn-sm" onclick="pageState['${col}']=Math.max(0,(pageState['${col}']||0)-1);refreshTable('${col}')" ${page===0?'disabled':''}>‹ Anterior</button>
    <span>Página ${page+1} de ${totalPages}</span>
    <button class="btn btn-sm" onclick="pageState['${col}']=(pageState['${col}']||0)+1;refreshTable('${col}')" ${page>=totalPages-1?'disabled':''}>Siguiente ›</button>
  </div>` : '';

  // Actualizar solo la tabla y el contador, sin tocar el input
  const cardEl = document.getElementById('table-card-'+col);
  if(cardEl){
    cardEl.innerHTML = `<table><colgroup>${colgroup}</colgroup>
      <thead><tr>${cfg.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows||'<tr><td colspan="'+cfg.cols.length+'" style="text-align:center;color:var(--text2);padding:20px">Sin resultados</td></tr>'}</tbody>
    </table>${pager}`;
  }

  // Actualizar contador
  const countEl = document.getElementById('search-count-'+col);
  if(countEl) countEl.textContent = total.toLocaleString('es-AR') + ' resultado' + (total!==1?'s':'');
}

function renderListSection(col){
  const cfgs={
    articulos:{title:'Artículos',cols:['Código','Nombre','Categoría','Unidad','Stock','Mín','Precio','Ubicación',''],widths:['9%','24%','12%','7%','6%','5%','8%','16%','7%'],addLabel:'+ Nuevo artículo',addFn:"openModalArticulo(null)"},
    personal:{title:'Personal',cols:['Legajo','Nombre','Empresa/Cargo','Teléfono','Obra',''],widths:['8%','25%','18%','14%','22%','8%'],addLabel:'+ Nuevo',addFn:"openModalPersonal(null)"},
    obras:{title:'Obras',cols:['N°','Nombre','Dirección','Responsable','Estado',''],widths:['6%','32%','24%','18%','10%','10%'],addLabel:'+ Nueva obra',addFn:"openModalObra(null)"}
  };
  const cfg=cfgs[col];
  const q=filterState[col]||'';
  let items=db[col];
  if(q){const ql=q.toLowerCase();items=items.filter(it=>JSON.stringify(it).toLowerCase().includes(ql));}
  const total=items.length;
  const page=pageState[col]||0;
  const pageItems=items.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;

  const rows=pageItems.map(it=>{
    let cells='';
    if(col==='articulos'){
      cells+=`<td title="${esc(it.codigo)}">${esc(it.codigo||'—')}</td>`;
      cells+=`<td title="${esc(it.nombre)}">${esc(it.nombre)}</td>`;
      cells+=`<td><span class="badge badge-gray">${esc(it.categoria||'—')}</span></td>`;
      cells+=`<td>${esc(it.unidad||'')}</td>`;
      cells+=`<td class="${it.stock<=it.stockMin&&it.stockMin>0?'stock-low':''}">${it.stock||0}</td>`;
      cells+=`<td style="color:var(--text2)">${it.stockMin||0}</td>`;
      cells+=`<td>$${(it.precio||0).toLocaleString('es-AR')}</td>`;
      const ub=it.ubicacion||'Pañol';
      cells+=`<td><span class="badge ${ub==='Pañol'?'badge-gray':'badge-info'}" style="font-size:11px;white-space:nowrap" title="${esc(ub)}">${esc(ub.length>20?ub.slice(0,18)+'...':ub)}</span></td>`;
    } else if(col==='personal'){
      const obra=db.obras.find(o=>o.id===it.obraId);
      cells+=`<td>${esc(it.dni||'—')}</td><td title="${esc(it.nombre)}">${esc(it.nombre)}</td><td>${esc(it.cargo||'—')}</td><td>${esc(it.telefono||'—')}</td><td title="${obra?obra.nombre:''}">${obra?esc(obra.nombre):'—'}</td>`;
    } else {
      cells+=`<td>${esc(it.numero||'—')}</td><td title="${esc(it.nombre)}">${esc(it.nombre)}</td><td title="${esc(it.direccion||'')}">${esc(it.direccion||'—')}</td><td>${esc(it.responsable||'—')}</td><td><span class="badge ${it.estado==='Activa'?'badge-ok':'badge-gray'}">${it.estado||'—'}</span></td>`;
    }
    const editFn=col==='articulos'?`openModalArticulo('${it.id}')`:col==='personal'?`openModalPersonal('${it.id}')`:col==='obras'?`openModalObra('${it.id}')`:null;
    if(editFn) cells+=`<td style="white-space:nowrap"><button class="btn btn-sm" onclick="${editFn}">Editar</button> <button class="btn btn-danger" onclick="deleteItem('${col}','${it.id}')">✕</button></td>`;
    return `<tr>${cells}</tr>`;
  }).join('');

  const colgroup=cfg.widths.map(w=>`<col style="width:${w}">`).join('');

  return `<div class="section-title">${cfg.title}</div>
  <div class="toolbar">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input class="search-input" id="search-${col}" placeholder="Buscar en ${cfg.title.toLowerCase()}..." value="${esc(q)}" oninput="filterState['${col}']=this.value;pageState['${col}']=0;refreshTable('${col}')" autocomplete="off"/>
      <span style="font-size:12px;color:var(--text2)" id="search-count-${col}">${total.toLocaleString('es-AR')} resultado${total!==1?'s':''}</span>
    </div>
    <button class="btn btn-primary" onclick="${cfg.addFn}">${cfg.addLabel}</button>
  </div>
  <div class="card" style="overflow-x:auto" id="table-card-${col}">
    <table><colgroup>${colgroup}</colgroup>
      <thead><tr>${cfg.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows||'<tr><td colspan="'+cfg.cols.length+'" style="text-align:center;color:var(--text2);padding:20px">Sin resultados</td></tr>'}</tbody>
    </table>
    ${totalPages>1?`<div class="pager">
      <button class="btn btn-sm" onclick="pageState['${col}']=Math.max(0,(pageState['${col}']||0)-1);refreshTable('${col}')" ${page===0?'disabled':''}>‹ Anterior</button>
      <span>Página ${page+1} de ${totalPages}</span>
      <button class="btn btn-sm" onclick="pageState['${col}']=(pageState['${col}']||0)+1;refreshTable('${col}')" ${page>=totalPages-1?'disabled':''}>Siguiente ›</button>
    </div>`:''}
  </div>`;
}

function openModalArticulo(id){
  const a=id?db.articulos.find(x=>x.id===id):{id:'',codigo:'',nombre:'',categoria:'',unidad:'UNIDAD',stock:0,stockMin:0,precio:0,ubicacion:'Pañol'};

  const ubicOpts='<option value="Pañol" '+(a.ubicacion==='Pañol'?'selected':'')+'>Pañol</option>'+db.obras.map(o=>`<option value="${esc(o.nombre)}" ${a.ubicacion===o.nombre?'selected':''}>${o.numero?esc(o.numero)+' — ':''} ${esc(o.nombre)}</option>`).join('');
  openModal(`<div class="modal-title">${id?'Editar':'Nuevo'} artículo</div>
    <div class="form-row"><div class="form-group"><label>Código</label><input id="m-cod" value="${esc(a.codigo)}"/></div>
    <div class="form-group"><label>Nombre</label><input id="m-nom" value="${esc(a.nombre)}"/></div></div>
    <div class="form-row">
      <div class="form-group"><label>Categoría</label><input id="m-cat" value="${esc(a.categoria)}" list="cat-list"/><datalist id="cat-list">${cats.map(c=>`<option value="${esc(c)}">`).join('')}</datalist></div>
      <div class="form-group"><label>Unidad de medida</label><input id="m-uni" value="${esc(a.unidad)}"/></div>
    </div>
    <div class="form-row triple">
      <div class="form-group"><label>Stock actual</label><input id="m-stk" type="number" value="${a.stock}"/></div>
      <div class="form-group"><label>Stock mínimo</label><input id="m-min" type="number" value="${a.stockMin}"/></div>
      <div class="form-group"><label>Precio unitario (U$D)</label><input id="m-pre" type="number" value="${a.precio}"/></div>
    </div>
    <div class="form-row single"><div class="form-group"><label>Ubicación actual</label>
      <select id="m-ubic">${ubicOpts}</select>
    </div></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveArticulo('${id||''}')">Guardar</button></div>`);
}
function saveArticulo(id){
  const obj={id:id||uid(),codigo:v('m-cod'),nombre:v('m-nom'),categoria:v('m-cat'),unidad:v('m-uni'),stock:n('m-stk'),stockMin:n('m-min'),precio:n('m-pre'),ubicacion:v('m-ubic')||'Pañol'};
  if(id){const i=db.articulos.findIndex(x=>x.id===id);db.articulos[i]=obj;}else db.articulos.push(obj);
  markDirty('articulos',obj);saveDB();closeModal();showSection('articulos');
}

let stockPickerActive = {};
function stockPickerFilter(idx){
  const q=document.getElementById('stock-search-'+idx).value.trim().toLowerCase();
  const dd=document.getElementById('stock-dd-'+idx);
  document.getElementById('stock-id-'+idx).value='';
  if(!q||q.length<2){dd.style.display='none';dd.innerHTML='';return;}
  const results=db.articulos.filter(a=>(a.nombre||'').toLowerCase().includes(q)||(a.codigo||'').toLowerCase().includes(q)).slice(0,12);
  if(!results.length){dd.style.display='none';return;}
  stockPickerActive[idx]=-1;
  dd.innerHTML=results.map(a=>`<div class="sp-item"
    style="padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center"
    onmousedown="selectStockItem(${idx},'${a.id}','${esc(a.codigo?a.codigo+' — '+a.nombre:a.nombre).replace(/'/g,"\'")}')"
    onmouseover="this.style.background='var(--info-bg)'" onmouseout="this.style.background=''">
    <span style="font-family:monospace;font-size:12px;font-weight:700;min-width:70px;color:var(--info-text);flex-shrink:0">${esc(a.codigo||'')}</span>
    <span style="flex:1">${esc(a.nombre)}</span>
    <span style="font-size:11px;font-weight:600;color:${a.stock<=a.stockMin&&a.stockMin>0?'var(--danger-text)':'var(--ok-text)'};flex-shrink:0">${a.stock} u.</span>
  </div>`).join('');
  // Posicionar el dropdown con coordenadas fijas para que no quede cortado por el modal
  const input = document.getElementById('stock-search-'+idx);
  const rect = input.getBoundingClientRect();
  dd.style.position='fixed';
  dd.style.top=(rect.bottom+2)+'px';
  dd.style.left=rect.left+'px';
  dd.style.width=rect.width+'px';
  dd.style.zIndex='9999';
  dd.style.display='block';
}
function selectStockItem(idx,id,nombre){
  document.getElementById('stock-search-'+idx).value=nombre;
  document.getElementById('stock-id-'+idx).value=id;
  document.getElementById('stock-nombre-'+idx).value=nombre;
  document.getElementById('stock-dd-'+idx).style.display='none';
}
function stockPickerKeydown(e,idx){
  const dd=document.getElementById('stock-dd-'+idx);
  const items=dd.querySelectorAll('.sp-item');
  if(!items.length)return;
  if(!stockPickerActive[idx]&&stockPickerActive[idx]!==0)stockPickerActive[idx]=-1;
  let i=stockPickerActive[idx];
  if(e.key==='ArrowDown'){e.preventDefault();i=Math.min(i+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();i=Math.max(i-1,0);}
  else if(e.key==='Enter'&&i>=0){e.preventDefault();items[i].dispatchEvent(new MouseEvent('mousedown'));return;}
  else if(e.key==='Escape'){dd.style.display='none';return;}
  else return;
  stockPickerActive[idx]=i;
  items.forEach((el,j)=>{el.style.background=j===i?'var(--info-bg)':'';if(j===i)el.scrollIntoView({block:'nearest'});});
}

function confirmarRemito(sid){
  const s=db.solicitudes.find(x=>x.id===sid);
  // Leer ítems: artículo de stock vinculado + cantidad a despachar
  const itemsDespachar=s.items.map((item,idx)=>{
    const inputEl=document.getElementById('qty-'+idx);
    const cantDespachar=inputEl?Math.min(parseFloat(inputEl.value)||0, item.cantidad):item.cantidad;
    // Artículo de stock vinculado (si el pañolero lo seleccionó)
    const stockId=document.getElementById('stock-id-'+idx)?document.getElementById('stock-id-'+idx).value:'';
    const stockNombre=document.getElementById('stock-nombre-'+idx)?document.getElementById('stock-nombre-'+idx).value:'';
    const artStock=stockId?db.articulos.find(a=>a.id===stockId):null;
    return {
      articuloId: stockId || item.articuloId,
      nombre: stockNombre || item.nombre,
      cantidad: cantDespachar,
      unidad: artStock?artStock.unidad:item.unidad,
      itemSolicitado: item.nombre  // guarda el nombre genérico original
    };
  }).filter(item=>item.cantidad>0);

  if(!itemsDespachar.length){
    alert('No hay artículos con cantidad mayor a 0 para despachar.');
    return;
  }

  const nro='R-'+String(db.remitos.length+1).padStart(4,'0');
  const fecha=new Date().toISOString().slice(0,10);
  const remito={id:uid(),numero:nro,solicitudId:s.id,obraId:s.obraId,obraNombre:s.obraNombre,solicitante:s.solicitante,fecha,items:itemsDespachar,estado:'emitido'};

  // Descontar stock y actualizar ubicación si es Herramienta menor
  itemsDespachar.forEach(item=>{
    const art=db.articulos.find(a=>a.id===item.articuloId);
    if(art){
      art.stock=Math.max(0,art.stock-item.cantidad);
      if((art.categoria||'').toLowerCase()==='herramientas menores'){
        const obraRemito=db.obras.find(o=>o.id===s.obraId);
        art.ubicacion=obraRemito?obraRemito.nombre:'En obra';
        markDirty('articulos',art);
      }
    }
  });

  // Si se despachó todo → remitido; si fue parcial → parcialmente remitido
  const totalSolicitado=s.items.reduce((a,i)=>a+i.cantidad,0);
  const totalDespachado=itemsDespachar.reduce((a,i)=>a+i.cantidad,0);
  s.estado = totalDespachado >= totalSolicitado ? 'remitido' : 'parcial';

  db.remitos.push(remito);
  markDirty('remitos',remito);
  markDirty('solicitudes',s);
  saveDB();
  closeModal();
  verRemito(remito.id);
}

      <td class="desc">${esc(i.nombre)}</td>
    </tr>`).join('');

  if(!win){alert('Permitir ventanas emergentes para imprimir.');return;}

function onSolSearchKeydown(e){
  const list=document.getElementById('sol-ac-list');
  if(!list) return;
  const items=list.querySelectorAll('.autocomplete-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){
    e.preventDefault();
    solActiveIdx=Math.min(solActiveIdx+1, items.length-1);
    highlightSolItem(items);
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    solActiveIdx=Math.max(solActiveIdx-1, 0);
    highlightSolItem(items);
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(solActiveIdx>=0 && items[solActiveIdx]){
      const id=items[solActiveIdx].getAttribute('data-id');
      selectSolArt(id);
    }
  } else if(e.key==='Escape'){
    document.getElementById('sol-dropdown').innerHTML='';
    solActiveIdx=-1;
  }
}

function highlightSolItem(items){
  items.forEach((el,i)=>{
    el.style.background = i===solActiveIdx ? 'var(--info-bg)' : '';
    el.style.color = i===solActiveIdx ? 'var(--info-text)' : '';

  });
}

function obraPickerFilter(inputId, ddId, valId, activeIdx){
  const q = document.getElementById(inputId).value.trim().toLowerCase();

    (o.numero||'').toLowerCase().includes(q) ||

  ).slice(0, 20);

    });
  });

  // Mostrar todas al hacer focus si está vacío

function obraPickerKeydown(e, inputId, ddId, valId){
  const dd = document.getElementById(ddId);
  const items = dd.querySelectorAll('.obra-picker-item');
  if(!items.length) return;
  let idx = [...items].findIndex(el => el.classList.contains('active'));
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(idx < items.length-1) idx++;
    else idx = 0;
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(idx > 0) idx--;
    else idx = items.length-1;
  } else if(e.key === 'Enter' && idx >= 0){
    e.preventDefault();
    document.getElementById(inputId).value = items[idx].getAttribute('data-label');
    document.getElementById(valId).value = items[idx].getAttribute('data-id');
    dd.style.display = 'none';
    return;
  } else if(e.key === 'Escape'){
    dd.style.display = 'none'; return;
  } else { return; }
  items.forEach((el,i) => { el.classList.toggle('active', i===idx); if(i===idx) el.scrollIntoView({block:'nearest'}); });
}

function previsualizarArticulos(){
  const catFilt = document.getElementById('art-exp-cat').value;
  const ubicFilt = document.getElementById('art-exp-ubic').value;
  let items = db.articulos.filter(a=>(a.stock||0)>0);
  if(catFilt) items = items.filter(a=>(a.categoria||'')=== catFilt);
  if(ubicFilt) items = items.filter(a=>(a.ubicacion||'Pañol')===ubicFilt);

  if(!items.length){
    document.getElementById('art-exp-resultado').innerHTML='<p style="font-size:13px;color:var(--text2)">Sin artículos para los filtros seleccionados.</p>';
    return;
  }

  const totalValor = items.reduce((acc,a)=>acc+(a.stock||0)*(a.precio||0),0);
  const totalItems = items.length;

  // Agrupar por categoría
  const porCat = {};
  items.forEach(a=>{
    const c = a.categoria||'Sin categoría';
    if(!porCat[c]) porCat[c]={count:0,valor:0};
    porCat[c].count++;
    porCat[c].valor += (a.stock||0)*(a.precio||0);
  });

  const catRows = Object.entries(porCat).sort((a,b)=>b[1].valor-a[1].valor).map(([cat,d])=>`<tr>
    <td>${esc(cat)}</td>
    <td style="text-align:center">${d.count}</td>
    <td style="text-align:right;font-weight:500">U$D ${d.valor.toLocaleString('es-AR',{maximumFractionDigits:0})}</td>
  </tr>`).join('');

  document.getElementById('art-exp-resultado').innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <div class="metric" style="flex:1;min-width:140px"><div class="metric-label">Artículos con stock</div><div class="metric-value ok">${totalItems.toLocaleString('es-AR')}</div></div>
      <div class="metric" style="flex:1;min-width:140px"><div class="metric-label">Stock valorizado total</div><div class="metric-value ok" style="font-size:18px">U$D ${totalValor.toLocaleString('es-AR',{maximumFractionDigits:0})}</div></div>
    </div>
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Resumen por categoría</div>
    <table style="font-size:13px;max-width:500px">
      <thead><tr><th>Categoría</th><th style="text-align:center">Artículos</th><th style="text-align:right">Valor U$D</th></tr></thead>
      <tbody>${catRows}</tbody>
    </table>`;
}

function exportarArticulos(){
  const catFilt = document.getElementById('art-exp-cat').value;
  const ubicFilt = document.getElementById('art-exp-ubic').value;
  let items = db.articulos;
  if(catFilt) items = items.filter(a=>(a.categoria||'')===catFilt);
  if(ubicFilt) items = items.filter(a=>(a.ubicacion||'Pañol')===ubicFilt);

  const fecha = new Date().toISOString().slice(0,10);
  const cols = ['Código','Nombre','Categoría','Unidad','Stock','Stock mínimo','Precio U$D','Total valorizado U$D','Ubicación'];
  const rows = items.map(a=>[
    a.codigo||'',
    a.nombre||'',
    a.categoria||'',
    a.unidad||'',
    a.stock||0,
    a.stockMin||0,
    a.precio||0,
    (a.stock||0)*(a.precio||0),
    a.ubicacion||'Pañol'
  ]);

  // Agregar fila de totales al final
  const totalStock = items.reduce((acc,a)=>acc+(a.stock||0),0);
  const totalValor = items.reduce((acc,a)=>acc+(a.stock||0)*(a.precio||0),0);
  rows.push(['','TOTAL','','',totalStock,'','','U$D '+totalValor.toLocaleString('es-AR',{maximumFractionDigits:0}),'']);

  let csv = '\uFEFF' + cols.join(';') + '\n';
  rows.forEach(r=>{
    csv += r.map(c=>{
      const s = String(c===null||c===undefined?'':c);
      return s.includes(';')||s.includes('"')||s.includes('\n') ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(';') + '\n';
  });

  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url;
  el.download = `articulos_stock_${fecha}.csv`;
  document.body.appendChild(el);
  el.click();
  document.body.removeChild(el);
  URL.revokeObjectURL(url);
}

function verHerramientasEnObra(){
  // Filtrar herramientas menores que no están en el pañol
  const enObra = db.articulos.filter(a =>
    (a.categoria||'').toLowerCase()==='herramientas menores' &&
    (a.ubicacion||'Pañol') !== 'Pañol' &&
    (a.stock||0) > 0
  );

  if(!enObra.length){
    document.getElementById('hm-resultado').innerHTML=
      '<p style="font-size:13px;color:var(--text2)">No hay herramientas menores fuera del pañol.</p>';
    return;
  }

  // Agrupar por ubicación (obra)
  const porObra = {};
  enObra.forEach(a=>{
    const ub = a.ubicacion||'Desconocido';
    if(!porObra[ub]) porObra[ub]=[];
    porObra[ub].push(a);
  });

  let html = '';
  let totalGlobal = 0;

  for(const [obra, items] of Object.entries(porObra)){
    const obraObj = db.obras.find(o=>o.nombre===obra);
    const nroObra = obraObj?obraObj.numero||'—':'—';
    const totalObra = items.reduce((acc,a)=>acc+(a.stock||0)*(a.precio||0),0);

    html += `<div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;padding:6px 10px;background:var(--info-bg);color:var(--info-text);border-radius:var(--radius)">

      </div>
      <table style="font-size:12px">
        <thead><tr>
          <th style="width:12%">Código</th>
          <th>Herramienta</th>
          <th style="width:8%;text-align:center">Stock</th>
          <th style="width:8%">Unidad</th>
          <th style="width:12%;text-align:right">Precio U$D</th>
          <th style="width:12%;text-align:right">Total U$D</th>
        </tr></thead>
        <tbody>${items.map(a=>`<tr>
          <td style="font-family:monospace;font-size:11px;font-weight:700">${esc(a.codigo||'')}</td>
          <td>${esc(a.nombre)}</td>
          <td style="text-align:center">${a.stock||0}</td>
          <td>${esc(a.unidad||'')}</td>
          <td style="text-align:right">U$D ${(a.precio||0).toLocaleString('es-AR')}</td>
          <td style="text-align:right;font-weight:500">U$D ${((a.stock||0)*(a.precio||0)).toLocaleString('es-AR',{maximumFractionDigits:0})}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // Resumen total
  html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--bg3);border-radius:var(--radius)">
    <span style="font-size:13px;font-weight:600">${enObra.length} herramientas en ${Object.keys(porObra).length} obras</span>
    <span style="font-size:15px;font-weight:700;color:var(--info-text)">Total: U$D ${totalGlobal.toLocaleString('es-AR',{maximumFractionDigits:0})}</span>
  </div>` + html;

  // Botón exportar
  html += `<button class="btn btn-success" style="margin-top:8px" onclick="exportarHerramientasEnObra()">↓ Exportar Excel</button>`;

  document.getElementById('hm-resultado').innerHTML = html;
}

function exportarHerramientasEnObra(){
  const enObra=db.articulos.filter(a=>(a.categoria||'').toLowerCase()==='herramientas menores'&&(a.ubicacion||'Pañol')!=='Pañol'&&(a.stock||0)>0);
  const cols=['Código','Nombre','Categoría','Unidad','Stock','Precio U$D','Total U$D','Ubicación actual'];
  const rows=enObra.map(a=>[a.codigo||'',a.nombre,a.categoria,a.unidad,a.stock||0,a.precio||0,(a.stock||0)*(a.precio||0),a.ubicacion||'']);

function generarInforme(){
  const month = document.getElementById('inf-month').value;
  const desde = document.getElementById('inf-desde').value;
  const hasta = document.getElementById('inf-hasta').value;
  const obraId = document.getElementById('inf-obra').value;

  let remitos = db.remitos.filter(r => r.estado === 'emitido' || r.estado);

  // Filtro por mes/año
  if(month){
    remitos = remitos.filter(r => r.fecha && r.fecha.startsWith(month));
  } else {
    if(desde) remitos = remitos.filter(r => r.fecha >= desde);
    if(hasta) remitos = remitos.filter(r => r.fecha <= hasta);
  }

  // Filtro por obra
  if(obraId) remitos = remitos.filter(r => r.obraId === obraId);

  if(!remitos.length){
    document.getElementById('inf-resultado').innerHTML = '<p style="color:var(--text2);font-size:13px;padding:8px 0">No hay remitos para el período y filtros seleccionados.</p>';
    return;
  }

  // Construir filas detalladas (una por ítem)
  let filas = [];
  remitos.forEach(r => {
    const obra = db.obras.find(o => o.id === r.obraId);
    const nroObra = obra ? (obra.numero || '') : '';
    const nomObra = r.obraNombre || '';
    const totalRemito = r.items.reduce((acc,i)=>{ const a=db.articulos.find(x=>x.id===i.articuloId); return acc+(a?a.precio*i.cantidad:0); }, 0);
    r.items.forEach(item => {
      const art = db.articulos.find(x => x.id === item.articuloId);
      const precioUnit = art ? art.precio : 0;
      filas.push({
        fecha: r.fecha,
        nroRemito: r.numero,
        nroObra: nroObra,
        nombreObra: nomObra,
        solicitante: r.solicitante,
        articulo: item.nombre,
        cantidad: item.cantidad,
        unidad: item.unidad,
        precioUnit: precioUnit,
        subtotal: precioUnit * item.cantidad,
        totalRemito: totalRemito
      });
    });
  });

  // Métricas resumen
  const totalGeneral = [...new Set(remitos.map(r=>r.id))].reduce((acc,rid)=>{
    const r = remitos.find(x=>x.id===rid);
    return acc + r.items.reduce((a,i)=>{ const art=db.articulos.find(x=>x.id===i.articuloId); return a+(art?art.precio*i.cantidad:0); },0);
  },0);
  const obrasUnicas = [...new Set(remitos.map(r=>r.obraId))].length;

  const preview = filas.slice(0,10);

  document.getElementById('inf-resultado').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px">
      <div class="metric"><div class="metric-label">Remitos</div><div class="metric-value ok">${remitos.length}</div></div>
      <div class="metric"><div class="metric-label">Obras involucradas</div><div class="metric-value ok">${obrasUnicas}</div></div>
      <div class="metric"><div class="metric-label">Ítems totales</div><div class="metric-value ok">${filas.length}</div></div>
      <div class="metric"><div class="metric-label">Total referencial</div><div class="metric-value ok" style="font-size:15px">$${totalGeneral.toLocaleString('es-AR')}</div></div>
    </div>
    <div style="overflow-x:auto;margin-bottom:12px">
      <table style="font-size:12px;min-width:700px">
        <thead><tr>
          <th>Fecha</th><th>N° Remito</th><th>N° Obra</th><th>Obra</th><th>Artículo</th><th>Cant.</th><th>Unidad</th><th style="text-align:right">P. Unit.</th><th style="text-align:right">Total remito</th>
        </tr></thead>
        <tbody>
          ${preview.map(f=>`<tr>
            <td>${f.fecha}</td>
            <td style="font-family:monospace;font-weight:600">${esc(f.nroRemito)}</td>
            <td>${esc(f.nroObra)}</td>
            <td title="${esc(f.nombreObra)}">${esc(f.nombreObra)}</td>
            <td title="${esc(f.articulo)}">${esc(f.articulo)}</td>
            <td style="text-align:center">${f.cantidad}</td>
            <td>${esc(f.unidad)}</td>
            <td style="text-align:right">$${f.precioUnit.toLocaleString('es-AR')}</td>
            <td style="text-align:right">$${f.totalRemito.toLocaleString('es-AR')}</td>
          </tr>`).join('')}
          ${filas.length > 10 ? `<tr><td colspan="9" style="text-align:center;color:var(--text2);font-style:italic;padding:8px">... y ${filas.length-10} ítems más. Descargá el Excel para ver el detalle completo.</td></tr>` : ''}
        </tbody>
      </table>
    </div>
    <button class="btn btn-success" style="font-size:13px;padding:9px 18px" onclick="exportarExcel(${JSON.stringify(filas).replace(/</g,'\\u003c')})">
      ↓ Descargar Excel (.xlsx)
    </button>`;
}

function exportarExcel(filas){
  // Generar CSV con BOM para Excel con acentos correctos
  const cols = ['Fecha','N° Remito','N° Obra','Nombre Obra','Solicitante','Artículo / Descripción','Cantidad','Unidad','Precio Unitario','Total Remito'];
  const rows = filas.map(f => [
    f.fecha,
    f.nroRemito,
    f.nroObra,
    f.nombreObra,
    f.solicitante,
    f.articulo,
    f.cantidad,
    f.unidad,
    f.precioUnit,
    f.totalRemito
  ]);

  let csv = '\uFEFF'; // BOM para UTF-8 en Excel
  csv += cols.join(';') + '\n';
  rows.forEach(row => {
    csv += row.map(cell => {
      const val = String(cell === null || cell === undefined ? '' : cell);
      // Escapar celdas con punto y coma, comillas o saltos de línea
      if(val.includes(';') || val.includes('"') || val.includes('\n')){
        return '"' + val.replace(/"/g, '""') + '"';
      }
      return val;
    }).join(';') + '\n';
  });

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const mes = document.getElementById('inf-month').value || 'informe';
  a.href = url;
  a.download = `remitos_${mes.replace('-','_')}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
